<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Deal Won Celebration</title>
<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas#confetti {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  #card {
    position: relative;
    z-index: 2;
    width: 340px;
    padding: 44px 36px 36px;
    text-align: center;
    border-radius: 24px;
    background: linear-gradient(160deg, #ffffff 0%, #f4fbf7 100%);
    box-shadow: 0 24px 60px rgba(16, 90, 60, 0.25), 0 0 0 1px rgba(22, 163, 74, 0.06);
    transform: scale(0.8) translateY(10px);
    opacity: 0;
    animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes pop {
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  #badge {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    box-shadow: 0 8px 20px rgba(22, 163, 74, 0.35);
    animation: badgePulse 1.8s ease-in-out infinite;
  }

  @keyframes badgePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  #card h1 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 800;
    color: #0f2f21;
    letter-spacing: -0.3px;
  }

  #card .subtitle {
    margin: 0 0 20px;
    font-size: 14.5px;
    color: #5b6b63;
    line-height: 1.5;
  }

  #card .deal-name {
    font-weight: 700;
    color: #16a34a;
  }

  #statRow {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
  }

  .stat-pill {
    background: #eafbf1;
    border: 1px solid #cdeedb;
    color: #0f7a3d;
    font-size: 12.5px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 999px;
    white-space: nowrap;
  }

  #closeBtn {
    border: none;
    background: linear-gradient(135deg, #16a34a, #12833d);
    color: #fff;
    padding: 11px 28px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 6px 16px rgba(22, 163, 74, 0.3);
  }

  #closeBtn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(22, 163, 74, 0.38);
  }

  #closeBtn:active {
    transform: translateY(0);
  }

  #hint {
    margin: 14px 0 0;
    font-size: 11px;
    color: #9aa79f;
  }
</style>
</head>
<body>

  <div id="overlay">
    <canvas id="confetti"></canvas>
    <div id="card">
      <div id="badge">🏆</div>
      <h1>Deal Won!</h1>
      <p class="subtitle"><span class="deal-name" id="dealName">This deal</span> just closed. Great work!</p>
      <div id="statRow">
        <span class="stat-pill" id="amountPill" style="display:none;">💰 <span id="amountValue"></span></span>
        <span class="stat-pill">🎯 Closed Won</span>
      </div>
      <button id="closeBtn">Close</button>
      <p id="hint"></p>
    </div>
  </div>

<script>
  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  var W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var colors = ['#16a34a', '#f59e0b', '#3b82f6', '#ef4444', '#a855f7', '#facc15', '#06b6d4'];
  var pieces = [];
  var PIECE_COUNT = 180;

  function makePiece() {
    return {
      x: Math.random() * W,
      y: -20 - Math.random() * H * 0.6,
      w: 5 + Math.random() * 6,
      h: 9 + Math.random() * 7,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedY: 2 + Math.random() * 3.2,
      speedX: -1.6 + Math.random() * 3.2,
      rotation: Math.random() * 360,
      rotationSpeed: -7 + Math.random() * 14,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    };
  }

  for (var i = 0; i < PIECE_COUNT; i++) pieces.push(makePiece());

  var running = true;

  function draw() {
    if (!running) return;
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      p.y += p.speedY;
      p.x += p.speedX;
      p.rotation += p.rotationSpeed;
      if (p.y > H + 20) {
        pieces[i] = makePiece();
        pieces[i].y = -20;
      }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  function stopConfetti() {
    running = false;
    ctx.clearRect(0, 0, W, H);
  }

  function closeWidget() {
    stopConfetti();
    try {
      $Client.close();
    } catch (e) {
      console.log("closeWidget error: " + e.message);
    }
  }

  document.getElementById('closeBtn').addEventListener('click', closeWidget);

  ZOHO.embeddedApp.on("PageLoad", function (data) {
    if (data && data.EntityId) {
      ZOHO.CRM.API.getRecord({ Entity: "Deals", RecordID: data.EntityId })
        .then(function (res) {
          var record = res && res.data && res.data[0];
          if (record) {
            if (record.Deal_Name) {
              document.getElementById('dealName').textContent = record.Deal_Name;
            }
            if (record.Amount) {
              document.getElementById('amountValue').textContent =
                'Rs. ' + Number(record.Amount).toLocaleString('en-IN');
              document.getElementById('amountPill').style.display = 'inline-flex';
            }
          }
        })
        .catch(function () {});
    }
  });

  ZOHO.embeddedApp.init();
</script>

</body>
</html>
